name: Nightly PaaS ATS

on:
  schedule:
    # Scheduled nightly at 02:00 UTC. GitHub may start later.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force deployment even if composer.lock did not change"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nightly-paas-ats
  cancel-in-progress: false

jobs:
  update-and-deploy:
    name: Update and deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_STAGE: Checkout target branch
      DEPLOY_DECISION: pending
      DEPLOY_TARGET: ${{ matrix.name }}
      DEPLOY_BRANCH: ${{ matrix.branch }}
      DEPLOY_APPLICATION: ${{ matrix.application }}
    outputs:
      result: ${{ steps.deployment_summary.outputs.result }}
      summary: ${{ steps.deployment_summary.outputs.summary }}
      stage: ${{ steps.deployment_summary.outputs.stage }}
      target: ${{ steps.deployment_summary.outputs.target }}
      branch: ${{ steps.deployment_summary.outputs.branch }}
      application: ${{ steps.deployment_summary.outputs.application }}
      changed: ${{ steps.deployment_summary.outputs.changed }}
      commit: ${{ steps.deployment_summary.outputs.commit }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: trunk
            branch: paas/trunk
            application: nightly-ats-trunk

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          # Use a PAT so the pushed commit can trigger downstream workflows.
          # Fall back to the default GITHUB_TOKEN if no PAT is configured.
          token: ${{ secrets.COMPOSER_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Mark setup stage
        run: echo "DEPLOY_STAGE=Set up PHP" >> "$GITHUB_ENV"

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: grpc, opentelemetry, redis
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.name }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.name }}-
            ${{ runner.os }}-composer-

      - name: Configure Composer for GitHub rate limits
        run: composer config -g github-oauth.github.com "${{ secrets.GITHUB_TOKEN }}"

      - name: Update composer.lock
        run: |
          echo "DEPLOY_STAGE=Composer update" >> "$GITHUB_ENV"
          composer update shopware/platform --with-all-dependencies --no-interaction --no-scripts --no-install

      - name: Check for changes
        id: changes
        run: |
          echo "DEPLOY_STAGE=Check composer.lock changes" >> "$GITHUB_ENV"
          if git diff --quiet composer.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_CHANGED=false" >> "$GITHUB_ENV"
            echo "No changes to composer.lock."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_CHANGED=true" >> "$GITHUB_ENV"
            echo "composer.lock has been updated."
            git diff --stat composer.lock
          fi

      - name: Commit and push updated composer.lock
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "DEPLOY_STAGE=Commit and push composer.lock" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git commit -m "chore(${{ matrix.name }}): update composer.lock [skip ci]"
          git push origin "HEAD:${{ matrix.branch }}"

      - name: Record deployment decision
        env:
          FORCE_DEPLOY: ${{ inputs.force || false }}
        run: |
          if [[ "${{ steps.changes.outputs.changed }}" == "true" || "$FORCE_DEPLOY" == "true" ]]; then
            echo "DEPLOY_DECISION=deploy" >> "$GITHUB_ENV"
            echo "DEPLOY_STAGE=Install Shopware PaaS CLI" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_DECISION=skipped" >> "$GITHUB_ENV"
            echo "DEPLOY_STAGE=No composer.lock changes" >> "$GITHUB_ENV"
          fi

      - name: Install Shopware PaaS CLI
        if: steps.changes.outputs.changed == 'true' || inputs.force == true
        shell: bash
        env:
          SW_PAAS_DIR: ${{ runner.temp }}/sw-paas
          SW_PAAS_CLI_VERSION: "0.0.55"
          SW_PAAS_CLI_SHA256: b6e4e0fa2044a460a34402bbe3e4b4b3b955aa3c21598715a342d3f89457f769
        run: |
          set -euo pipefail
          echo "DEPLOY_STAGE=Install Shopware PaaS CLI" >> "$GITHUB_ENV"

          archive="${RUNNER_TEMP}/sw-paas_Linux_x86_64.tar.gz"
          download_url="https://github.com/shopware/sw-paas/releases/download/${SW_PAAS_CLI_VERSION}/sw-paas_Linux_x86_64.tar.gz"

          mkdir -p "$SW_PAAS_DIR/bin"
          curl -fsSL "$download_url" -o "$archive"
          echo "${SW_PAAS_CLI_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "$archive" -C "$SW_PAAS_DIR/bin" sw-paas
          chmod +x "$SW_PAAS_DIR/bin/sw-paas"

          echo "$SW_PAAS_DIR/bin" >> "$GITHUB_PATH"
          "$SW_PAAS_DIR/bin/sw-paas" --version

      - name: Deploy updated application
        if: steps.changes.outputs.changed == 'true' || inputs.force == true
        env:
          SW_PAAS_TOKEN: ${{ secrets.SW_PAAS_TOKEN }}
          SW_PAAS_ORGANIZATION: ${{ vars.SW_PAAS_ORGANIZATION }}
          SW_PAAS_PROJECT: ${{ vars.SW_PAAS_PROJECT }}
          SW_PAAS_APPLICATION: ${{ matrix.application }}
        run: |
          set -euo pipefail
          echo "DEPLOY_STAGE=Shopware PaaS application update" >> "$GITHUB_ENV"
          SW_PAAS_ORGANIZATION="${SW_PAAS_ORGANIZATION:-shopware-qa}"

          : "${SW_PAAS_TOKEN:?Missing GitHub Actions secret SW_PAAS_TOKEN}"
          : "${SW_PAAS_ORGANIZATION:?Missing PaaS organization}"
          : "${SW_PAAS_PROJECT:?Missing GitHub Actions variable SW_PAAS_PROJECT}"
          : "${SW_PAAS_APPLICATION:?Missing PaaS application}"

          commit_sha="$(git rev-parse HEAD)"
          max_attempts=3
          retry_delay_seconds=120

          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::PaaS deploy attempt ${attempt}/${max_attempts}"

            if sw-paas application update \
              --token "$SW_PAAS_TOKEN" \
              --organization "$SW_PAAS_ORGANIZATION" \
              --project "$SW_PAAS_PROJECT" \
              --application "$SW_PAAS_APPLICATION" \
              --commit-sha "$commit_sha"; then
              echo "DEPLOY_STAGE=Deployment completed" >> "$GITHUB_ENV"
              echo "::endgroup::"
              exit 0
            else
              exit_code=$?
            fi

            echo "::endgroup::"

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "PaaS deployment failed after ${max_attempts} attempts."
              exit "$exit_code"
            fi

            echo "PaaS deployment attempt ${attempt} failed; retrying in ${retry_delay_seconds}s."
            sleep "$retry_delay_seconds"
          done

      - name: Record deployment summary
        id: deployment_summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${DEPLOY_DECISION:-pending}" == "skipped" && "$JOB_STATUS" == "success" ]]; then
            result="skipped"
            summary="No deployment needed; composer.lock did not change."
          elif [[ "$JOB_STATUS" == "success" ]]; then
            result="success"
            summary="Deployment completed."
          else
            result="failure"
            summary="Deployment workflow failed during: ${DEPLOY_STAGE:-unknown}."
          fi

          short_sha="${COMMIT_SHA:0:8}"
          if git rev-parse --short=8 HEAD > /tmp/deploy-commit 2>/dev/null; then
            short_sha="$(cat /tmp/deploy-commit)"
          fi

          {
            echo "result=$result"
            echo "summary=$summary"
            echo "stage=${DEPLOY_STAGE:-unknown}"
            echo "target=${DEPLOY_TARGET:-unknown}"
            echo "branch=${DEPLOY_BRANCH:-unknown}"
            echo "application=${DEPLOY_APPLICATION:-unknown}"
            echo "changed=${DEPLOY_CHANGED:-unknown}"
            echo "commit=$short_sha"
          } >> "$GITHUB_OUTPUT"

  ats-platform:
    name: ATS Platform ${{ matrix.name }} shard ${{ matrix.shard }}/${{ matrix.total_shards }}
    needs: update-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: trunk
            shopware_ref: trunk
            # Resolves ATS_APP_URL_TRUNK and ATS_SHOPWARE_*_TRUNK.
            ats_config_suffix: TRUNK
            shard: 1
            total_shards: 2
          - name: trunk
            shopware_ref: trunk
            # Resolves ATS_APP_URL_TRUNK and ATS_SHOPWARE_*_TRUNK.
            ats_config_suffix: TRUNK
            shard: 2
            total_shards: 2

    env:
      ATS_CONFIG_SUFFIX: ${{ matrix.ats_config_suffix }}
      SHOPWARE_ACCEPTANCE_INSTANCE_TYPE: paas
      APP_URL: ${{ vars[format('ATS_APP_URL_{0}', matrix.ats_config_suffix)] || secrets[format('ATS_APP_URL_{0}', matrix.ats_config_suffix)] }}
      SHOPWARE_ACCESS_KEY_ID: ${{ secrets[format('ATS_SHOPWARE_ACCESS_KEY_ID_{0}', matrix.ats_config_suffix)] }}
      SHOPWARE_SECRET_ACCESS_KEY: ${{ secrets[format('ATS_SHOPWARE_SECRET_ACCESS_KEY_{0}', matrix.ats_config_suffix)] }}

    steps:
      - name: Checkout Shopware
        uses: actions/checkout@v4
        with:
          repository: shopware/shopware
          ref: ${{ matrix.shopware_ref }}
          path: shopware

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: shopware/tests/acceptance/package-lock.json

      - name: Validate ATS configuration
        run: |
          : "${APP_URL:?Missing GitHub Actions variable or secret ATS_APP_URL_${ATS_CONFIG_SUFFIX}}"
          : "${SHOPWARE_ACCESS_KEY_ID:?Missing GitHub Actions secret ATS_SHOPWARE_ACCESS_KEY_ID_${ATS_CONFIG_SUFFIX}}"
          : "${SHOPWARE_SECRET_ACCESS_KEY:?Missing GitHub Actions secret ATS_SHOPWARE_SECRET_ACCESS_KEY_${ATS_CONFIG_SUFFIX}}"

      - name: Install ATS dependencies
        working-directory: shopware/tests/acceptance
        run: npm ci

      - name: Install Playwright browser
        working-directory: shopware/tests/acceptance
        run: npx playwright install --with-deps chromium

      - name: Run ATS Platform suite
        working-directory: shopware/tests/acceptance
        run: npx playwright test --workers=1 --project=Platform --shard=${{ matrix.shard }}/${{ matrix.total_shards }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ats-platform-${{ matrix.name }}-shard-${{ matrix.shard }}-of-${{ matrix.total_shards }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            shopware/tests/acceptance/test-results/
            shopware/tests/acceptance/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  notify-slack:
    name: Notify Slack
    needs:
      - update-and-deploy
      - ats-platform
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Notify Slack nightly status
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_JOB_RESULT: ${{ needs.update-and-deploy.result }}
          DEPLOY_RESULT: ${{ needs.update-and-deploy.outputs.result }}
          DEPLOY_SUMMARY: ${{ needs.update-and-deploy.outputs.summary }}
          DEPLOY_STAGE: ${{ needs.update-and-deploy.outputs.stage }}
          DEPLOY_TARGET: ${{ needs.update-and-deploy.outputs.target }}
          DEPLOY_BRANCH: ${{ needs.update-and-deploy.outputs.branch }}
          DEPLOY_APPLICATION: ${{ needs.update-and-deploy.outputs.application }}
          DEPLOY_CHANGED: ${{ needs.update-and-deploy.outputs.changed }}
          DEPLOY_COMMIT: ${{ needs.update-and-deploy.outputs.commit }}
          ATS_JOB_RESULT: ${{ needs.ats-platform.result }}
          ATS_SHARDS: "2"
        run: |
          set -euo pipefail

          deploy_result="${DEPLOY_RESULT:-$DEPLOY_JOB_RESULT}"
          deploy_summary="${DEPLOY_SUMMARY:-Deployment job result: ${DEPLOY_JOB_RESULT}.}"
          if [[ "$DEPLOY_JOB_RESULT" != "success" ]]; then
            deploy_result="failure"
            if [[ "${DEPLOY_RESULT:-}" == "failure" && -n "${DEPLOY_SUMMARY:-}" ]]; then
              deploy_summary="$DEPLOY_SUMMARY"
            else
              deploy_summary="Deployment job failed."
            fi
          fi

          case "$ATS_JOB_RESULT" in
            success)
              ats_summary="ATS Platform passed across ${ATS_SHARDS} shards."
              ;;
            failure)
              ats_summary="ATS Platform failed. Check Playwright artifacts for the failing shard."
              ;;
            skipped)
              ats_summary="ATS Platform was skipped."
              ;;
            cancelled)
              ats_summary="ATS Platform was cancelled."
              ;;
            *)
              ats_summary="ATS Platform result: ${ATS_JOB_RESULT}."
              ;;
          esac

          if [[ "$DEPLOY_JOB_RESULT" == "success" && "$ATS_JOB_RESULT" == "success" ]]; then
            overall="success"
          else
            overall="failure"
          fi

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "::error title=Missing Slack webhook::SLACK_WEBHOOK_URL is not configured; cannot send the nightly status notification."
            exit 1
          fi

          payload="$(jq -n \
            --arg text "Nightly PaaS ATS ${overall}: ${DEPLOY_APPLICATION:-unknown}" \
            --arg overall "$overall" \
            --arg deploy_result "$deploy_result" \
            --arg deploy_summary "$deploy_summary" \
            --arg deploy_stage "${DEPLOY_STAGE:-unknown}" \
            --arg ats_result "$ATS_JOB_RESULT" \
            --arg ats_summary "$ats_summary" \
            --arg target "${DEPLOY_TARGET:-unknown}" \
            --arg branch "${DEPLOY_BRANCH:-unknown}" \
            --arg application "${DEPLOY_APPLICATION:-unknown}" \
            --arg changed "${DEPLOY_CHANGED:-unknown}" \
            --arg commit "${DEPLOY_COMMIT:-unknown}" \
            --arg run "$RUN_URL" \
            '{
              text: $text,
              blocks: [
                {type: "section", text: {type: "mrkdwn", text: "*Nightly PaaS ATS:* \($overall)"}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Deployment:*\n\($deploy_result)"},
                  {type: "mrkdwn", text: "*ATS Platform:*\n\($ats_result)"},
                  {type: "mrkdwn", text: "*Target:*\n\($target)"},
                  {type: "mrkdwn", text: "*Application:*\n\($application)"},
                  {type: "mrkdwn", text: "*Branch:*\n\($branch)"},
                  {type: "mrkdwn", text: "*Commit:*\n`\($commit)`"},
                  {type: "mrkdwn", text: "*Deploy stage:*\n\($deploy_stage)"},
                  {type: "mrkdwn", text: "*Lock changed:*\n\($changed)"}
                ]},
                {type: "section", text: {type: "mrkdwn", text: "*Deploy:* \($deploy_summary)\n*ATS:* \($ats_summary)"}},
                {type: "section", text: {type: "mrkdwn", text: "*Run:* <\($run)|Open GitHub Actions>"}}
              ]
            }')"

          response_file="${RUNNER_TEMP}/slack-response.txt"
          if ! http_status="$(curl -sS -o "$response_file" -w "%{http_code}" -H "Content-Type: application/json" -d "$payload" "$SLACK_WEBHOOK_URL")"; then
            echo "::error title=Slack notification failed::Slack webhook request failed."
            if [[ -s "$response_file" ]]; then
              sed -n '1,20p' "$response_file"
            fi
            exit 1
          fi

          if (( http_status < 200 || http_status >= 300 )); then
            echo "::error title=Slack notification failed::Slack webhook returned HTTP ${http_status}."
            if [[ -s "$response_file" ]]; then
              sed -n '1,20p' "$response_file"
            fi
            exit 1
          fi

          echo "Slack notification sent."
